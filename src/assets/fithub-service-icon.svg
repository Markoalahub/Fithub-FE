<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Fithub Service Icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#312E81" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="115" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle top highlight -->
  <rect x="2" y="2" width="508" height="200" rx="113" fill="white" fill-opacity="0.07"/>

  <!-- Connector: PM to AI -->
  <path d="M186 256 Q221 256 221 256" stroke="white" stroke-width="7" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Connector: AI to DEV -->
  <path d="M291 256 Q326 256 326 256" stroke="white" stroke-width="7" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- PM node (left circle) -->
  <circle cx="148" cy="256" r="40" fill="white" fill-opacity="0.15"/>
  <circle cx="148" cy="256" r="30" fill="white"/>
  <!-- PM icon: person -->
  <circle cx="148" cy="247" r="8" fill="#4338CA"/>
  <path d="M132 268 Q148 260 164 268" stroke="#4338CA" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- AI node (center diamond) -->
  <g transform="translate(256,256)">
    <rect x="-32" y="-32" width="64" height="64" rx="8" fill="white" fill-opacity="0.2" transform="rotate(45)"/>
    <rect x="-24" y="-24" width="48" height="48" rx="6" fill="white" transform="rotate(45)"/>
    <!-- Lightning bolt for AI -->
    <path d="M4 -12 L-4 0 L2 0 L-4 12 L8 -2 L1 -2 Z" fill="#4338CA" stroke="none"/>
  </g>

  <!-- DEV node (right circle) -->
  <circle cx="364" cy="256" r="40" fill="white" fill-opacity="0.15"/>
  <circle cx="364" cy="256" r="30" fill="white"/>
  <!-- DEV icon: code brackets -->
  <path d="M352 249 L344 256 L352 263" stroke="#4338CA" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M376 249 L384 256 L376 263" stroke="#4338CA" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="360" y1="246" x2="368" y2="266" stroke="#4338CA" stroke-width="3" stroke-linecap="round"/>

  <!-- Labels -->
  <text x="148" y="314" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="white" fill-opacity="0.7">PM</text>
  <text x="256" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="white" fill-opacity="0.7">AI</text>
  <text x="364" y="314" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="white" fill-opacity="0.7">DEV</text>
</svg>
