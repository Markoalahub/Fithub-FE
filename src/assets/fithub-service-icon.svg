<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Fithub Icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1E1B4B" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" filter="url(#sh)"/>

  <!-- Subtle top-edge highlight -->
  <rect x="2" y="2" width="508" height="190" rx="98" fill="white" fill-opacity="0.06"/>

  <!-- F lettermark, visually centered -->
  <text
    x="256"
    y="366"
    text-anchor="middle"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="298"
    font-weight="800"
    fill="white"
  >F</text>

  <!-- Accent dot — bottom-right -->
  <circle cx="406" cy="406" r="24" fill="white" fill-opacity="0.30"/>
</svg>
