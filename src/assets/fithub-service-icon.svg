<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Fithub Service Icon</title>
  <desc id="desc">Pipeline and collaboration icon with restored rounded internal design and transparent outer background.</desc>

  <defs>
    <linearGradient id="chipGradient" x1="68" y1="56" x2="444" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5" />
      <stop offset="1" stop-color="#6366F1" />
    </linearGradient>

    <linearGradient id="flowGradient" x1="132" y1="160" x2="392" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5B4FC" />
      <stop offset="1" stop-color="#818CF8" />
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#312E81" flood-opacity="0.2" />
    </filter>

    <filter id="innerGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#C7D2FE" flood-opacity="0.7" />
    </filter>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="108" fill="url(#chipGradient)" filter="url(#softShadow)" />

  <path
    d="M136 186H284C306.091 186 324 203.909 324 226V226C324 248.091 341.909 266 364 266H376"
    fill="none"
    stroke="url(#flowGradient)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#innerGlow)"
  />

  <path
    d="M136 326H252C274.091 326 292 308.091 292 286V286C292 263.909 309.909 246 332 246H376"
    fill="none"
    stroke="#E0E7FF"
    stroke-opacity="0.95"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="136" cy="186" r="26" fill="#FFFFFF" />
  <circle cx="136" cy="326" r="26" fill="#FFFFFF" />
  <circle cx="376" cy="246" r="26" fill="#FFFFFF" />
  <circle cx="376" cy="266" r="21" fill="#C7D2FE" />

  <rect x="218" y="198" width="92" height="24" rx="12" fill="#EEF2FF" fill-opacity="0.9" />
  <rect x="208" y="288" width="80" height="20" rx="10" fill="#E0E7FF" fill-opacity="0.85" />
</svg>
